<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ahrar Bin Aslam's personal portfolio site showcasing experience, projects, publications, and certifications.">
  <title>{{ page.title }} - {{ site.title }}</title>
  <!-- Preload and include Bootstrap CSS -->
  <link rel="preload" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" as="style">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon">
</head>
<body>
  <header class="site-header navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand mx-auto" href="/">
      <span>{{ site.title }}</span>
    </a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav mx-auto">
        <li class="nav-item">
          <a class="nav-link" href="/" aria-label="Homepage">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/experience" aria-label="Experience">Experience</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/projects" aria-label="Projects">Projects</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/publications" aria-label="Publications">Publications</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/certifications" aria-label="Certifications">Certifications</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/cv" aria-label="CV">CV</a>
        </li>
      </ul>
    </div>
  </header>

  <main class="main-content container">
    {{ content }}
  </main>

  <footer class="site-footer text-center py-4">
    <p>&copy; 2024 Ahrar Bin Aslam</p>
  </footer>

  <!-- Include Bootstrap JS and dependencies -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.11/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
